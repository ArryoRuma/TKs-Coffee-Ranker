seo:
  title: Sippd | Track every sip
  description: Sippd is your personal coffee log to rate, review, and remember every cup.
title: "Track every sip.\nRemember every favorite."
description: Sippd is your personal coffee log to rate, review, and remember every cup.
hero:
  headline: Now with Wanna Sip lists
  supporting: From your morning latte to your weekend pour-over, never forget what you loved.
  links:
    - label: Log your first sip
      to: /dashboard
      color: primary
      size: xl
    - label: Explore Sips
      to: /diary
      color: neutral
      variant: soft
      size: xl
socialProof: Join people who are finally remembering what they actually like.
howItWorks:
  headline: How it works
  title: Three steps to knowing your taste.
  description: Start simple, stay consistent, and your coffee memory compounds fast.
  items:
    - icon: i-lucide-pen-line
      title: 1. Log a Sip
      description: Add what you are drinking, where you got it, and your Sip Score.
    - icon: i-lucide-trending-up
      title: 2. Build Your Taste
      description: Over time, identify patterns in what you love and what you skip.
    - icon: i-lucide-brain
      title: 3. Never Forget a Great Cup
      description: Your Sip Log becomes your personal memory for coffee.
features:
  headline: Capabilities
  title: Everything your coffee habit needs.
  description: From your first sip to your all-time favorites, Sippd has every tool to build your coffee memory.
  items:
    - icon: i-lucide-coffee
      title: Log Every Coffee
      description: Track drinks, cafes, roasters, and tasting notes in seconds.
    - icon: i-lucide-star
      title: Sip Score
      description: Rate each coffee so your favorites naturally rise to the top.
    - icon: i-lucide-scroll-text
      title: Your Sip Log
      description: Keep a clean, scrollable history of every coffee you had.
    - icon: i-lucide-bookmark
      title: Saved Sips
      description: Bookmark coffees you want to come back to.
    - icon: i-lucide-list-todo
      title: Wanna Sip
      description: Maintain a running list of coffees, cafes, and beans to try next.
    - icon: i-lucide-trophy
      title: Top Sips
      description: See your all-time best coffees automatically organized.
metrics:
  headline: By the numbers
  title: Built around your coffee habit.
  description: Simple, fast, and yours. Every number that matters for building your personal coffee memory.
  items:
    - value: < 5s
      label: Time to log
      class: text-primary
    - value: 100%
      label: Your data
      class: text-success
    - value: "∞"
      label: Coffees tracked
      class: text-info
    - value: "0"
      label: Forgotten great cups
      class: text-warning
valueProps:
  - title: Know your taste.
    body: Most people drink great coffee and forget it the next day. Sippd helps you build memory for what you enjoy so every next cup gets better.
  - title: From first sip to favorite.
    body: Whether it is a quick cold brew or a carefully dialed espresso, every cup tells a story. Sippd keeps track of them all.
cta:
  title: "Start logging\nyour coffee."
  description: It only takes one sip to start building your taste.
  command: pnpm dev
  links:
    - label: Log your first sip
      to: /dashboard
      color: primary
footer: Sippd - your coffee, remembered.
