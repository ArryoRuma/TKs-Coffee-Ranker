seo:
  title: Sippd | Track every sip
  description: Sippd is your personal coffee log to rate, review, and remember every cup.
hero:
  eyebrow: Sippd
  title: Track every sip.
  lead: Sippd is your personal coffee log to rate, review, and remember every cup.
  supporting: From your morning latte to your weekend pour-over, never forget what you loved.
  primaryCta:
    label: Log your first sip
    to: /dashboard
  secondaryCta:
    label: Explore Sips
    to: /diary
socialProof: Join people who are finally remembering what they actually like.
howItWorks:
  title: How it works
  cards:
    - title: 1. Log a Sip
      body: Add what you are drinking, where you got it, and your Sip Score.
    - title: 2. Build Your Taste
      body: Over time, identify patterns in what you love and what you skip.
    - title: 3. Never Forget a Great Cup
      body: Your Sip Log becomes your personal memory for coffee.
coreFeatures:
  title: Core features
  cards:
    - title: Log Every Coffee
      body: Track drinks, cafes, roasters, and tasting notes in seconds.
    - title: Sip Score
      body: Rate each coffee so your favorites naturally rise to the top.
    - title: Your Sip Log
      body: Keep a clean, scrollable history of every coffee you had.
    - title: Saved Sips
      body: Bookmark coffees you want to come back to.
    - title: Wanna Sip
      body: Maintain a running list of coffees, cafes, and beans to try next.
    - title: Top Sips
      body: See your all-time best coffees automatically organized.
valueProps:
  - title: Know your taste.
    body: Most people drink great coffee and forget it the next day. Sippd helps you build memory for what you enjoy so every next cup gets better.
  - title: From first sip to favorite.
    body: Whether it is a quick cold brew or a carefully dialed espresso, every cup tells a story. Sippd keeps track of them all.
cta:
  title: Start logging your coffee.
  body: It only takes one sip to start building your taste.
  button:
    label: Log your first sip
    to: /dashboard
footer: Sippd - your coffee, remembered.
